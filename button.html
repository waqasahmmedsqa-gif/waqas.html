<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* YAHAN SE CUSTOMIZE KAREIN */
            --btn-accent: #00b3b3;       /* Glow aur Border ka color */
            --icon-size: 24px;          /* Icon ki width/height */
            --glass-opacity: 0.05;      /* Button ki transparency */
            --glow-strength: 15px;      /* Glow kitna phele ga */
            --text-color: #ffffff;      /* Button text ka color */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #030a13; /* Dark background for visibility */
            margin: 0;
        }

        /* BUTTON CONTAINER */
        .glass-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 8px 25px 8px 8px;
            background: rgba(255, 255, 255, var(--glass-opacity));
            backdrop-filter: blur(10px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px var(--glow-strength) rgba(0, 179, 179, 0.1);
        }

        /* ICON HOLDER (The Dark Circle) */
        .icon-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-color);
        }

        /* SVG ICON STYLING */
        .icon-box svg {
            width: var(--icon-size);
            height: var(--icon-size);
            fill: none;
            stroke: currentColor; /* Text color pick karega */
            stroke-width: 2;
        }

        /* TEXT STYLING */
        .btn-label {
            color: var(--text-color);
            font-family: sans-serif;
            font-weight: 500;
            font-size: 16px;
        }

        /* HOVER EFFECTS */
        .glass-btn:hover {
            border-color: var(--btn-accent);
            box-shadow: 0 0 var(--glow-strength) var(--btn-accent);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <a href="#" class="glass-btn">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="btn-label">View More</Main>ore</span>
    </a>

</body>
</html>
