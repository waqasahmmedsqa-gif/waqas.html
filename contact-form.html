<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
        button { background: #00bcd4; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <form action="https://formspree.io/f/mgoranby" method="POST">
        <label>Your email:</label>
        <input type="email" name="email" required>
        
        <label>Your message:</label>
        <textarea name="message" rows="4" required></textarea>
        
        <button type="submit">Send</button>
    </form>
</body>
</html>
