<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Drifted Away</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.5deg); }
        }
        @keyframes cosmic-float {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translate(30px, -50px); opacity: 0; }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes neon-pulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(16,185,129,0.2)); opacity: 0.9; }
            50% { filter: drop-shadow(0 0 35px rgba(16,185,129,0.5)); opacity: 1; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-slow { animation: float 10s ease-in-out infinite; }
        .animate-cosmic { animation: cosmic-float 12s linear infinite; }
        .animate-spin-slow { animation: spin-slow 40s linear infinite; }
        .animate-reverse-spin { animation: spin-slow 50s linear reverse infinite; }
        .animate-neon { animation: neon-pulse 4s ease-in-out infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-[#050B18] overflow-hidden text-white h-screen w-screen flex items-center justify-center relative">

    <div class="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-emerald-500/10 blur-[120px] rounded-full animate-float-slow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[30vw] h-[30vw] bg-cyan-500/10 blur-[100px] rounded-full animate-float"></div>

    <div class="absolute border border-white/[0.04] rounded-full w-[800px] h-[800px] animate-spin-slow pointer-events-none"></div>
    <div class="absolute border border-white/[0.06] rounded-full w-[500px] h-[500px] animate-reverse-spin pointer-events-none"></div>

    <main class="relative z-10 text-center flex flex-col items-center px-6 animate-float">
        
        <h1 class="text-[120px] md:text-[180px] font-extrabold leading-none tracking-tighter opacity-90 animate-neon">
            404
        </h1>

        <div class="flex items-center gap-3 glass-card px-5 py-2 rounded-full mb-8">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
            <span class="text-[10px] uppercase tracking-[0.3em] font-bold opacity-80">Connection Lost in Deep Space</span>
        </div>

        <div class="max-w-xl mb-12">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">
                Oops! You've <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Drifted Away</span>
            </h2>
            <p class="text-slate-400 text-lg leading-relaxed">
                The orbital coordinates for this page are no longer in our system. Ground control suggests returning to base.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
            <a href="/" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-10 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all transform hover:-translate-y-1 active:scale-95 shadow-[0_10px_30px_-10px_rgba(16,185,129,0.5)]">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Teleport Home
            </a>
            <a href="mailto:support@system.com" class="glass-card hover:bg-white/10 text-white font-bold px-10 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all transform hover:-translate-y-1 active:scale-95">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.5 8.5 0 0 1 8.5 6.8z"></path></svg>
                Contact Support
            </a>
        </div>
    </main>

    <footer class="absolute bottom-10 w-full text-center">
        <div class="flex items-center justify-center gap-4 opacity-20 mb-2">
            <div class="h-px w-12 bg-white"></div>
            <div class="w-1.5 h-1.5 border border-white rounded-full"></div>
            <div class="h-px w-12 bg-white"></div>
        </div>
        <p class="text-[9px] uppercase tracking-[0.6em] font-bold opacity-30 select-none">
            Launch Well System • Proprietary OS
        </p>
    </footer>

</body>
</html>
